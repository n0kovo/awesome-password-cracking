name: PR Quality

permissions:
  contents: read
  issues: read
  pull-requests: write

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  pr-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@v0
        with:
          # General Settings
          max-failures: 4

          # PR Branch Checks
          allowed-target-branches: ""
          blocked-target-branches: ""
          allowed-source-branches: ""
          blocked-source-branches: |
            main
            master

          # PR Size Checks
          max-changed-files: 1
          max-changed-lines: 10

          # PR Quality Checks
          max-negative-reactions: 0
          require-maintainer-can-modify: true

          # PR Title Checks
          require-conventional-title: false

          # PR Description Checks
          require-description: true
          max-description-length: 2500
          max-emoji-count: 2
          max-code-references: 5
          require-linked-issue: false
          blocked-terms: "AI_SELF_DISCLOSURE"
          blocked-issue-numbers: ""

          # PR Template Checks
          require-pr-template: false
          strict-pr-template-sections: ""
          optional-pr-template-sections: ""
          max-additional-pr-template-sections: 0

          # Commit Message Checks
          max-commit-message-length: 500
          require-conventional-commits: false
          require-commit-author-match: true
          blocked-commit-authors: ""

          # File Checks
          allowed-file-extensions: ""
          allowed-paths: ""
          blocked-paths: |
            .github
          require-final-newline: false
          max-added-comments: 0

          # User Checks
          detect-spam-usernames: false
          min-account-age: 30
          max-daily-forks: 10
          require-public-profile: true
          min-profile-completeness: 2

          # Merge Checks
          min-repo-merged-prs: 0
          min-repo-merge-ratio: 0
          min-global-merge-ratio: 30
          global-merge-ratio-exclude-own: true

          # Exemptions
          exempt-draft-prs: false
          exempt-bots: |
            actions-user
            autofix-ci[bot]
            dependabot[bot]
            renovate[bot]
            github-actions[bot]
          exempt-users: ""
          exempt-author-association: "OWNER,MEMBER,COLLABORATOR"
          exempt-label: "exempt"
          exempt-pr-label: ""
          exempt-all-milestones: false
          exempt-all-pr-milestones: false
          exempt-milestones: ""
          exempt-pr-milestones: ""

          # PR Success Actions
          success-add-pr-labels: ""

          # PR Failure Actions
          failure-remove-pr-labels: ""
          failure-remove-all-pr-labels: false
          failure-add-pr-labels: "suspected spam/AI-slop"
          failure-pr-message: ""
          close-pr: true
          lock-pr: false
